<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Email Threat Detector</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    width: 360px;
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: #fafafa;
    color: #1a1a1a;
    font-size: 14px;
    line-height: 1.55;
  }

  /* ── HEADER ── */
  .header {
    display: flex;
    align-items: center;
    padding: 16px 18px;
    border-bottom: 1px solid #e4e4e4;
    background: #fff;
    gap: 10px;
  }
  .header-icon {
    width: 24px;
    height: 24px;
    background: #1a1a1a;
    border-radius: 5px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    color: #fff;
    flex-shrink: 0;
  }
  .header-title {
    font-size: 15px;
    font-weight: 600;
    color: #1a1a1a;
  }

  /* ── MAIN BODY ── */
  .body { padding: 18px; }

  /* ── SCAN BUTTON ── */
  .scan-btn {
    width: 100%;
    padding: 12px 18px;
    background: #1a1a1a;
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 500;
    font-family: inherit;
    cursor: pointer;
    transition: background 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }
  .scan-btn:hover:not(:disabled) { background: #333; }
  .scan-btn:disabled {
    background: #c0c0c0;
    cursor: not-allowed;
  }

  /* ── LOADING ── */
  .loading {
    display: none;
    align-items: center;
    gap: 10px;
    margin-top: 16px;
    padding: 12px 14px;
    background: #f0f0f0;
    border-radius: 8px;
    font-size: 13px;
    color: #555;
  }
  .loading.active { display: flex; }
  .spinner {
    width: 16px;
    height: 16px;
    border: 2px solid #ccc;
    border-top-color: #555;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    flex-shrink: 0;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── ERROR ── */
  .error-box {
    display: none;
    margin-top: 14px;
    padding: 12px 14px;
    background: #fff4f4;
    border: 1px solid #f5c6c6;
    border-radius: 8px;
    font-size: 13px;
    color: #b00;
    line-height: 1.5;
  }
  .error-box.active { display: block; }

  /* ── RESULTS ── */
  .results {
    display: none;
    margin-top: 16px;
    flex-direction: column;
    gap: 12px;
  }
  .results.active { display: flex; }

  /* ── VERDICT CARD ── */
  .verdict-card {
    border-radius: 8px;
    padding: 14px 16px;
    display: flex;
    align-items: flex-start;
    gap: 12px;
  }
  .verdict-card.LOW    { background: #eef8f1; border: 1px solid #b0dfc0; }
  .verdict-card.MEDIUM { background: #fffaf0; border: 1px solid #efd98e; }
  .verdict-card.HIGH   { background: #fff4f4; border: 1px solid #f0b8b8; }

  .verdict-icon { font-size: 24px; line-height: 1; flex-shrink: 0; margin-top: 1px; }

  .verdict-right { flex: 1; min-width: 0; }
  .verdict-label {
    font-size: 16px;
    font-weight: 700;
    letter-spacing: 0.03em;
    text-transform: uppercase;
  }
  .verdict-card.LOW    .verdict-label { color: #1a7a3a; }
  .verdict-card.MEDIUM .verdict-label { color: #8a6200; }
  .verdict-card.HIGH   .verdict-label { color: #c00; }

  .verdict-conf {
    font-size: 12px;
    color: #999;
    margin-top: 2px;
  }
  .verdict-summary {
    font-size: 13px;
    color: #444;
    margin-top: 6px;
    line-height: 1.55;
  }

  /* ── ADVICE CARD ── */
  .advice-card {
    border-radius: 8px;
    padding: 12px 14px;
    font-size: 13px;
    line-height: 1.5;
    display: flex;
    align-items: flex-start;
    gap: 10px;
  }
  .advice-card.LOW    { background: #f5fbf6; border: 1px solid #c4e8cf; color: #1a6e35; }
  .advice-card.MEDIUM { background: #fffdf5; border: 1px solid #f0dfa0; color: #7a5600; }
  .advice-card.HIGH   { background: #fff6f6; border: 1px solid #f0c0c0; color: #a00; }
  .advice-icon { font-size: 16px; flex-shrink: 0; line-height: 1.3; }
  .advice-text { flex: 1; }

  /* ── THREAT BREAKDOWN (BAR CHART) ── */
  .breakdown {
    border: 1px solid #e4e4e4;
    border-radius: 8px;
    background: #fff;
    overflow: hidden;
  }
  .breakdown-title {
    font-size: 14px;
    font-weight: 600;
    color: #333;
    padding: 10px 14px;
    border-bottom: 1px solid #f0f0f0;
  }
  .breakdown-list {
    padding: 10px 14px 14px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .bar-item {
    display: flex;
    flex-direction: column;
    gap: 3px;
  }
  .bar-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .bar-label {
    font-size: 13px;
    font-weight: 600;
    color: #333;
  }
  .bar-score {
    font-size: 12px;
    font-weight: 600;
    color: #888;
  }
  .bar-track {
    width: 100%;
    height: 8px;
    background: #f0f0f0;
    border-radius: 4px;
    overflow: hidden;
  }
  .bar-fill {
    height: 100%;
    border-radius: 4px;
    transition: width 0.6s ease;
    width: 0%;
  }
  .bar-fill.low    { background: #34a853; }
  .bar-fill.medium { background: #f59e0b; }
  .bar-fill.high   { background: #e53e3e; }
  .bar-detail {
    font-size: 13px;
    color: #666;
    line-height: 1.5;
    margin-top: 2px;
  }


</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="header-icon">✉</div>
  <span class="header-title">Email Threat Detector</span>
</div>

<!-- BODY -->
<div class="body">

  <!-- Scan Button -->
  <button class="scan-btn" id="scanBtn">
    <span>🔍</span>
    <span id="scanBtnText">Scan Open Email</span>
  </button>

  <!-- Loading -->
  <div class="loading" id="loading">
    <div class="spinner"></div>
    <span id="loadingMsg">Analyzing…</span>
  </div>

  <!-- Error -->
  <div class="error-box" id="errorBox"></div>

  <!-- Results -->
  <div class="results" id="results">

    <!-- Verdict -->
    <div class="verdict-card" id="verdictBanner">
      <div class="verdict-icon" id="verdictIcon">—</div>
      <div class="verdict-right">
        <div class="verdict-label" id="verdictLabel">—</div>
        <div class="verdict-conf"  id="verdictConf"></div>
        <div class="verdict-summary" id="verdictSummary"></div>
      </div>
    </div>

    <!-- Action Advice -->
    <div class="advice-card" id="adviceCard" style="display:none">
      <span class="advice-icon" id="adviceIcon"></span>
      <span class="advice-text" id="adviceText"></span>
    </div>

    <!-- Threat Breakdown -->
    <div class="breakdown" id="breakdownSection">
      <div class="breakdown-title">Threat Breakdown</div>
      <div class="breakdown-list" id="breakdownList"></div>
    </div>

  </div>
  <!-- /results -->

</div>
<!-- /body -->

<script src="popup.js"></script>
</body>
</html>
